<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0A1628; }
      .foreground { fill: #D4AF37; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #F5F3F0; }
      .foreground { fill: #0A1628; }
    }
  </style>
  <g clip-path="url(#clip0_anchor)">
    <rect class="background" width="180" height="180" rx="37" />
    <!-- Anchor icon -->
    <g style="transform: scale(85%); transform-origin: center">
      <!-- Anchor ring -->
      <circle cx="90" cy="55" r="22" class="foreground" fill="none" stroke-width="8"/>
      <!-- Vertical stem -->
      <path d="M90 77V140" class="foreground" stroke-width="8" stroke-linecap="round"/>
      <!-- Crossbar -->
      <path d="M55 105H125" class="foreground" stroke-width="6" stroke-linecap="round"/>
      <!-- Left fluke -->
      <path d="M55 140L90 115" class="foreground" stroke-width="8" stroke-linecap="round" fill="none"/>
      <!-- Right fluke -->
      <path d="M125 140L90 115" class="foreground" stroke-width="8" stroke-linecap="round" fill="none"/>
      <!-- Bottom point -->
      <path d="M69 155L90 175L111 155" class="foreground" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  <defs>
    <clipPath id="clip0_anchor">
      <rect width="180" height="180" fill="white"/>
    </clipPath>
  </defs>
</svg>
